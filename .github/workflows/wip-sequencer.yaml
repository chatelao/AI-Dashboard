name: Sequential Assigner
on:
  issues:
    types: [closed]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  assign_next:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce WIP=1 and Assign
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TARGET_USER: "jules"
        run: |
          OPEN_COUNT=$(gh issue list --repo $REPO --assignee $TARGET_USER --state open --json number | jq length)
          if [ "$OPEN_COUNT" -gt 0 ]; then
            echo "$TARGET_USER is currently busy."
            exit 0
          fi
          
          NEXT_ISSUE=$(gh issue list --repo $REPO --search "no:assignee" --state open --limit 1 --json number --jq '.[0].number')
          if [ -n "$NEXT_ISSUE" ] && [ "$NEXT_ISSUE" != "null" ]; then
            gh issue edit $NEXT_ISSUE --repo $REPO --add-assignee $TARGET_USER
            echo "Assigned issue #$NEXT_ISSUE to $TARGET_USER."
          else
            echo "No unassigned issues in the queue."
          fi
